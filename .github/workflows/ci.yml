name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify sample bundle round-trips
        run: pnpm sample

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenith-adventure-importer-dev
          path: packages/foundry-module/dist/
          retention-days: 7
