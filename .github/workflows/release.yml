name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Patch module.json with release URLs
        run: |
          cd packages/foundry-module/dist
          # Foundry uses these URLs to check for updates and download the latest version.
          # The manifest URL points to the *latest* release's module.json so updates work.
          # The download URL points to *this specific tag's* zip.
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('module.json', 'utf8'));
            manifest.version = '${{ steps.version.outputs.version }}';
            manifest.manifest = 'https://github.com/${{ github.repository }}/releases/latest/download/module.json';
            manifest.download = 'https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/zenith-adventure-importer.zip';
            fs.writeFileSync('module.json', JSON.stringify(manifest, null, 2));
          "

      - name: Build release zip
        run: |
          cd packages/foundry-module/dist
          zip -r ../../../zenith-adventure-importer.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            zenith-adventure-importer.zip
            packages/foundry-module/dist/module.json
